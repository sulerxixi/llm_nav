# 2D 语义标注文件
# 所有坐标单位为"米"，基于 map 坐标系
# 执行 scripts/semantic_to_keepout.py 后生成 keepout_mask.pgm / keepout_mask.yaml

# ──────────────────────────────────────────────────────────────
# map_info: 对应当前导航地图的元数据（必须与 my_room_map.yaml 一致）
# ──────────────────────────────────────────────────────────────
map_info:
  image: my_room_map.pgm        # 参考地图（仅用于获取尺寸）
  resolution: 0.05              # 米/像素
  origin: [-10.1, -5.48, 0.0]  # OGM 左下角坐标 [x, y, yaw]

# ──────────────────────────────────────────────────────────────
# zones: 需要标注的语义区域列表
#   id      : 区域唯一标识（任意字符串）
#   class   : 语义分类
#             keepout   → 绝对禁止进入（代价 = 254）
#             slow_down → 减速区（代价 = 128，需自定义 CostmapFilter）
#             charging  → 充电区（仅标注，不影响代价地图）
#   polygon : 多边形顶点列表 [[x1,y1], [x2,y2], ...] 单位：米
#             至少3个顶点，顺序任意（脚本内部会自动闭合）
#   comment : 可选注释
# ──────────────────────────────────────────────────────────────
zones:
  # ── 示例1：危险设备区域（机械臂工作范围）──
  - id: danger_zone_1
    class: keepout
    comment: "机械臂工作区，机器人禁止进入"
    polygon:
      - [1.0,  0.5]
      - [3.0,  0.5]
      - [3.0,  2.0]
      - [1.0,  2.0]

  # ── 示例2：桌子下方空间 ──
  - id: table_under_1
    class: keepout
    comment: "桌子腿内侧，空间太小"
    polygon:
      - [-3.0, -1.0]
      - [-1.5, -1.0]
      - [-1.5,  0.5]
      - [-3.0,  0.5]

  # ── 示例3：通道限速区 ──
  - id: narrow_corridor
    class: slow_down
    comment: "狭窄走廊，建议降速（暂不接入代价地图）"
    polygon:
      - [-0.5, -4.0]
      - [ 0.5, -4.0]
      - [ 0.5, -1.5]
      - [-0.5, -1.5]

  # ── 示例4：充电桩位置（单点圆形，半径0.4m）──
  - id: charging_station_1
    class: charging
    comment: "充电桩停靠位置"
    center: [6.0, 3.5]
    radius: 0.4
